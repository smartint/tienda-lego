<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Selección de piezas del robot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#637083;--line:#d8e0ec;--primary:#2563eb;--ok:#16a34a;--danger:#dc2626;--soft:#eaf1ff;--shadow:0 10px 25px rgba(20,35,60,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink)}
.app{max-width:1500px;margin:0 auto;padding:18px}
header{position:sticky;top:0;z-index:5;background:linear-gradient(135deg,#fff,#eaf1ff);border:1px solid var(--line);border-radius:0 0 22px 22px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
h1{margin:0 0 8px;font-size:clamp(1.4rem,2.5vw,2rem)}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px}
button,label.filebtn{border:0;background:var(--primary);color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer;font-weight:800;box-shadow:0 4px 10px rgba(37,99,235,.18)}
button:hover,label.filebtn:hover{filter:brightness(.94)}
button.ok{background:var(--ok)}button.danger{background:var(--danger)}button.light{background:white;color:var(--ink);border:1px solid var(--line);box-shadow:none}
input[type=file]{display:none}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.card img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#f8fafc;display:block}
.card-body{padding:10px}
.name{font-weight:800;font-size:.92rem;min-height:2.4em;word-break:break-word}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:9px 0}
.pill{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center;font-weight:800}
.pill span{display:block;color:var(--muted);font-size:.72rem;font-weight:700}
.select{width:100%;font-size:1rem}
.disabled{opacity:.45}
.stats{display:flex;flex-wrap:wrap;gap:10px}
.stat{background:var(--soft);border:1px solid #dbe7ff;border-radius:14px;padding:10px 12px;font-weight:900}
.log{background:white;border:1px solid var(--line);border-radius:18px;padding:12px;margin:16px 0;box-shadow:var(--shadow)}
.log ul{margin:8px 0 0;padding-left:20px;max-height:150px;overflow:auto}
@media(max-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:480px){.grid{grid-template-columns:1fr}.toolbar{display:grid}.toolbar>*{width:100%}}
@media print{.toolbar,.log{display:none!important}header{position:static;box-shadow:none}.grid{grid-template-columns:repeat(3,1fr)}.card{box-shadow:none;break-inside:avoid}}
</style>
</head>
<body>
<div class="app">
<header>
<h1>Selección de piezas del robot</h1>
<div class="stats">
  <div class="stat">Créditos acumulados: <span id="totalCredits">0</span></div>
  <div class="stat">Piezas seleccionadas: <span id="totalSelected">0</span></div>
  <div class="stat">Piezas en almacén: <span id="totalStock">0</span></div>
</div>
<div class="toolbar">
  <button onclick="exportCSV()">Exportar CSV</button>
  <button onclick="exportJSON()">Exportar JSON</button>
  <label class="filebtn">Importar CSV<input id="csvInput" type="file" accept=".csv,text/csv"></label>
  <label class="filebtn">Importar JSON<input id="jsonInput" type="file" accept=".json,application/json"></label>
  <button class="light" onclick="window.print()">Imprimir</button>
  <button class="danger" onclick="resetSelection()">Reiniciar selección</button>
</div>
</header>
<section class="log">
<strong>Registro de selección</strong>
<ul id="log"></ul>
</section>
<main id="gallery" class="grid"></main>
</div>

let log = [];

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function render(){
  const g=document.getElementById("gallery");
  g.innerHTML="";
  items.forEach((it,i)=>{
    const empty=(Number(it.stock)||0)<=0;
    const card=document.createElement("article");
    card.className="card"+(empty?" disabled":"");
    card.innerHTML=`
      <img src="${it.src}" alt="${esc(it.name)}">
      <div class="card-body">
        <div class="name">${esc(it.name)}</div>
        <div class="meta">
          <div class="pill"><span>Stock</span>${Number(it.stock)||0}</div>
          <div class="pill"><span>Créditos</span>${Number(it.price)||0}</div>
        </div>
        <button class="select ${empty?'danger':'ok'}" onclick="selectPiece(${i})" ${empty?'disabled':''}>
          ${empty?'Sin stock':'Seleccionar pieza'}
        </button>
      </div>`;
    g.appendChild(card);
  });
  updateStats();
}
function selectPiece(i){
  const it=items[i];
  if((Number(it.stock)||0)<=0) return;
  it.stock--;
  it.sold=(Number(it.sold)||0)+1;
  log.unshift({name:it.name, price:Number(it.price)||0, date:new Date().toLocaleString("es-ES")});
  render();
}
function updateStats(){
  const credits=items.reduce((a,b)=>a+(Number(b.sold||0)*Number(b.price||0)),0);
  const selected=items.reduce((a,b)=>a+(Number(b.sold)||0),0);
  const stock=items.reduce((a,b)=>a+(Number(b.stock)||0),0);
  document.getElementById("totalCredits").textContent=credits;
  document.getElementById("totalSelected").textContent=selected;
  document.getElementById("totalStock").textContent=stock;
  document.getElementById("log").innerHTML=log.map(x=>`<li>${esc(x.date)} · ${esc(x.name)} · ${x.price} créditos</li>`).join("");
}
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];
    if(c=='"'&&q&&n=='"'){cur+='"';i++}
    else if(c=='"'){q=!q}
    else if(c==","&&!q){row.push(cur);cur=""}
    else if((c=="\n"||c=="\r")&&!q){if(c=="\r"&&n=="\n")i++;row.push(cur);cur="";if(row.some(v=>v.trim()!=""))rows.push(row);row=[]}
    else cur+=c;
  }
  row.push(cur);if(row.some(v=>v.trim()!=""))rows.push(row);return rows;
}
function cell(v){const s=String(v??"");return /[",\n\r;]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function exportCSV(){
  const lines=[["archivo","stock","creditos","seleccionadas","src"].map(cell).join(",")];
  items.forEach(x=>lines.push([x.name,x.stock,x.price,x.sold||0,x.src].map(cell).join(",")));
  download("seleccion_piezas_robot.csv",lines.join("\n"),"text/csv;charset=utf-8");
}
function exportJSON(){
  download("seleccion_piezas_robot.json",JSON.stringify({items,log},null,2),"application/json;charset=utf-8");
}
function download(filename,content,type){
  const blob=new Blob([content],{type});const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},500);
}
document.getElementById("csvInput").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;const rows=parseCSV(await f.text());if(!rows.length)return;
  const head=rows[0].map(x=>x.trim().toLowerCase());
  let start=1, ni=head.findIndex(h=>["archivo","file","nombre","imagen","name"].includes(h)),
      si=head.findIndex(h=>["stock","piezas","existencias","cantidad"].includes(h)),
      pi=head.findIndex(h=>["creditos","créditos","precio","valor","price"].includes(h)),
      vi=head.findIndex(h=>["seleccionadas","vendidas","sold"].includes(h));
  if(ni<0){ni=0;si=1;pi=2;vi=3;start=0}
  for(let r=start;r<rows.length;r++){
    const row=rows[r], name=(row[ni]||"").split("/").pop().trim(); if(!name)continue;
    const it=items.find(x=>x.name.toLowerCase()==name.toLowerCase()); if(!it)continue;
    if(si>=0)it.stock=Math.max(0,parseInt(row[si]||"0",10)||0);
    if(pi>=0)it.price=Math.max(0,parseInt(row[pi]||"0",10)||0);
    if(vi>=0)it.sold=Math.max(0,parseInt(row[vi]||"0",10)||0);
  }
  render(); e.target.value="";
});
document.getElementById("jsonInput").addEventListener("change",async e=>{
  const f=e.target.files[0];if(!f)return;const data=JSON.parse(await f.text());
  if(Array.isArray(data.items)){items=data.items}
  else if(Array.isArray(data)){items=data}
  if(Array.isArray(data.log))log=data.log;
  render(); e.target.value="";
});
function resetSelection(){
  if(!confirm("¿Seguro que quieres reiniciar la selección? Se devolverán las piezas seleccionadas al stock."))return;
  items.forEach(it=>{it.stock=(Number(it.stock)||0)+(Number(it.sold)||0);it.sold=0});
  log=[];render();
}
render();
</script>
</body>
